<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Assignment</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">🗂 LeaveTask</div>
        <p>Management System</p>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-label">Navigation</div>
          <div id="nav-links">
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="employees.html">Employees</a>
            <a href="leave-approval.html">Leave Approval</a>
            <a href="task-assignment.html">Task Assignment</a>
          </div>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-initials">?</div>
          <div>
            <div class="user-name" id="user-name">Loading…</div>
            <div class="user-role" id="user-role"></div>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <h1 id="page-title">Task Assignment</h1>
        <p>Create and assign tasks to employees.</p>
      </div>
      <div id="alert-container"></div>
      <div class="card">
        <div class="card-header">
          <h3>Assign New Task</h3>
        </div>
        <div class="card-body">
          <form id="taskForm">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="title">Task Title</label>
                <input class="form-control" type="text" id="title" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="priority">Priority</label>
                <select class="form-control" id="priority">
                  <option value="LOW">Low</option>
                  <option value="MEDIUM">Medium</option>
                  <option value="HIGH">High</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="description">Description</label>
              <textarea class="form-control" id="description" rows="3"></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="assignedTo">Assign To</label>
                <select class="form-control" id="assignedTo" required>
                  <option value="">Loading employees...</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="dueDate">Due Date</label>
                <input class="form-control" type="date" id="dueDate" required />
              </div>
            </div>
            <div class="form-actions">
              <button class="btn btn-primary" type="submit">Assign Task</button>
            </div>
          </form>
        </div>
      </div>
      <div class="card" style="margin-top: 24px;">
        <div class="card-header">
          <h3>All Tasks</h3>
        </div>
        <div class="card-body">
          <div id="taskList"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/app.js"></script>
</body>
</html>
