<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave Request</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">🗂 LeaveTask</div>
        <p>Management System</p>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-label">Navigation</div>
          <div id="nav-links">
            <a href="employee-dashboard.html">Dashboard</a>
            <a href="leave-request.html">Leave Request</a>
            <a href="task-status.html">Task Status</a>
          </div>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-initials">?</div>
          <div>
            <div class="user-name" id="user-name">Loading…</div>
            <div class="user-role" id="user-role"></div>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <h1 id="page-title">Leave Request</h1>
        <p>Submit a new leave request or view your leave history.</p>
        <button class="btn btn-outline" onclick="loadMyLeaves()">Refresh History</button>
      </div>
      <div id="alert-container"></div>
      <div class="card">
        <div class="card-header">
          <h3>Submit Leave Request</h3>
        </div>
        <div class="card-body">
          <form id="leaveForm">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="leaveType">Leave Type</label>
                <select class="form-control" id="leaveType" required>
                  <option value="ANNUAL">Annual</option>
                  <option value="SICK">Sick</option>
                  <option value="PERSONAL">Personal</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="startDate">Start Date</label>
                <input class="form-control" type="date" id="startDate" required />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="endDate">End Date</label>
                <input class="form-control" type="date" id="endDate" required />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="reason">Reason</label>
              <textarea class="form-control" id="reason" rows="3" required></textarea>
            </div>
            <div class="form-actions">
              <button class="btn btn-primary" type="submit">Submit Request</button>
            </div>
          </form>
        </div>
      </div>
      <div class="card" style="margin-top: 24px;">
        <div class="card-header">
          <h3>Your Leave History</h3>
        </div>
        <div class="card-body">
          <div id="myLeaveHistory"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/app.js"></script>
</body>
</html>
