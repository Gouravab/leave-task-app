<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employees</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">🗂 LeaveTask</div>
        <p>Management System</p>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-label">Navigation</div>
          <div id="nav-links">
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="employees.html">Employees</a>
            <a href="leave-approval.html">Leave Approval</a>
            <a href="task-assignment.html">Task Assignment</a>
          </div>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-initials">?</div>
          <div>
            <div class="user-name" id="user-name">Loading…</div>
            <div class="user-role" id="user-role"></div>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <h1 id="page-title">Employees</h1>
        <p>Manage employee information.</p>
      </div>
      <div id="alert-container"></div>
      <div class="card">
        <div class="card-header">
          <h3>Add New Employee</h3>
        </div>
        <div class="card-body">
          <form id="newEmployeeForm">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="name">Name</label>
                <input class="form-control" type="text" id="name" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" type="email" id="email" required />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="department">Department</label>
                <input class="form-control" type="text" id="department" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="designation">Designation</label>
                <input class="form-control" type="text" id="designation" required />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="role">Role</label>
                <select class="form-control" id="role">
                  <option value="EMPLOYEE">Employee</option>
                  <option value="ADMIN">Admin</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" type="password" id="password" required />
              </div>
            </div>
            <div class="form-actions">
              <button class="btn btn-primary" type="submit">Add Employee</button>
            </div>
          </form>
        </div>
      </div>
      <div class="card" style="margin-top: 24px;">
        <div class="card-header">
          <h3>All Employees</h3>
        </div>
        <div class="card-body">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Department</th>
                  <th>Designation</th>
                  <th>Role</th>
                </tr>
              </thead>
              <tbody id="employeeTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/app.js"></script>
</body>
</html>
