<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - LeaveTask</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>LeaveTask</h1>
      <p>Employee Leave & Task Management</p>
    </div>
    <div id="alert-container"></div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" type="email" id="email" placeholder="admin@company.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" placeholder="Password" required />
      </div>
      <button class="btn btn-primary" type="submit">Login</button>
    </form>
    <div style="margin-top: 16px; font-size: 13px; color: var(--gray-500);">
      Use <strong>admin@company.com</strong> / <strong>admin123</strong> or seeded employee credentials.
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
